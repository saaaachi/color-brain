<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Brain - Stroop Test Training</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; position: fixed; touch-action: none; }
        body { background: #fdfdfd; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; display: flex; flex-direction: column; }
        
        /* 上部広告：100px 固定 */
        #ad-top { width: 100%; height: 100px; background: #263238; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100; border-bottom: 3px solid #4CAF50; }

        /* ゲームエリア */
        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #fff; overflow: hidden; }
        #game-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #333; z-index: 10; display: none; }
        
        #question-text { font-size: 72px; font-weight: 900; margin-bottom: 40px; transition: transform 0.1s; }
        
        /* 選択肢ボタン */
        .choice-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 360px; }
        .choice-btn { 
            height: 90px; border: none; border-radius: 20px; color: white; 
            font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px rgba(0,0,0,0.1);
            transition: transform 0.05s;
        }
        .choice-btn:active { transform: scale(0.92); box-shadow: none; }

        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.97); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 500; padding: 20px; 
        }

        /* 【収益】300x250 レクタングル */
        #ad-middle-box {
            width: 300px; height: 250px; background: #f5f5f5;
            margin: 15px 0; display: none; justify-content: center; align-items: center;
            border-radius: 12px; border: 1px solid #ddd; overflow: hidden;
        }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        .menu-btn { width: 270px; padding: 18px; font-size: 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #4CAF50; color: white; box-shadow: 0 5px #2E7D32; }
        #retry-btn:active { transform: translateY(3px); box-shadow: none; }
        #retry-btn:disabled { background: #ccc; box-shadow: none; transform: none; color: #888; }
        .sub-btn { background: #ff4081; color: white; box-shadow: 0 5px #c2185b; font-size: 16px; }

        /* インタースティシャル */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="ui">TIME: 15.0 | SCORE: 0</div>
        
        <div id="game-area">
            <div id="question-text">準備はいい？</div>
            <div class="choice-container" id="choices"></div>
        </div>

        <div id="menuScreen">
            <h2 id="result-msg" style="color:#333; margin: 5px 0; font-size: 32px;">Color Brain</h2>
            <p id="menu-desc" style="margin:5px 0; font-size: 16px; color: #666; font-weight: bold; text-align: center; line-height: 1.4;">「文字の意味」ではなく<br>「文字の色」を選べ！脳トレ開始！</p>
            
            <div id="ad-middle-box">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート！ ★</button>
                <a href="https://saaaachi.github.io/" class="sub-btn menu-btn">他のゲームで遊ぶ</a>
            </div>
        </div>

        <div id="inter-screen">
            <div class="inter-content">
                <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            {name:"赤",code:"#f44336"},
            {name:"青",code:"#2196f3"},
            {name:"緑",code:"#4caf50"},
            {name:"黄色",code:"#ffc107"}
        ];
        let score=0, timeLeft=15, timer, gameActive=false, correctCode="", playCount=0;
        
        const qText = document.getElementById("question-text"),
              ui = document.getElementById("ui"),
              menuScreen = document.getElementById("menuScreen"),
              adMid = document.getElementById('ad-middle-box'),
              resultMsg = document.getElementById('result-msg'),
              retryBtn = document.getElementById('retry-btn'),
              choiceArea = document.getElementById("choices");

        function startNewGame() {
            menuScreen.style.display = 'none';
            adMid.style.display = 'none';
            ui.style.display = 'block';
            score = 0;
            timeLeft = 15;
            gameActive = true;
            nextQuestion();
            
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 0.1;
                ui.innerText = `TIME: ${Math.max(0,timeLeft).toFixed(1)} | SCORE: ${score}`;
                if(timeLeft <= 0) gameOver();
            }, 100);
        }

        function nextQuestion() {
            const textIdx = Math.floor(Math.random()*colors.length);
            let colorIdx;
            // 文字の意味と色が必ず異なるように設定（ストループ効果の最大化）
            do { colorIdx = Math.floor(Math.random()*colors.length); } while(colorIdx === textIdx);
            
            correctCode = colors[colorIdx].code;
            qText.innerText = colors[textIdx].name;
            qText.style.color = correctCode;
            
            choiceArea.innerHTML = "";
            // ボタンをシャッフル
            [...colors].sort(() => Math.random() - 0.5).forEach(c => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.style.backgroundColor = c.code;
                btn.onclick = () => checkAnswer(c.code);
                choiceArea.appendChild(btn);
            });
        }

        function checkAnswer(code) {
            if(!gameActive) return;
            if(code === correctCode){
                score++;
                timeLeft += 0.7; // 正解で少し時間回復
                nextQuestion();
            } else {
                timeLeft -= 1.5; // 不正解でペナルティ
                qText.style.transform = "translateX(20px)";
                setTimeout(() => qText.style.transform = "translateX(-20px)", 50);
                setTimeout(() => qText.style.transform = "translateX(0)", 100);
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(timer);
            playCount++;

            resultMsg.innerText = "TIME UP!";
            document.getElementById("menu-desc").innerHTML = `SCORE: <span style="font-size:28px; color:#f44336;">${score}</span><br>脳が混乱しましたか？`;
            
            retryBtn.innerText = "お待ちください...";
            retryBtn.disabled = true;
            adMid.style.display = "flex"; 
            menuScreen.style.display = "flex";

            // 誤タップ防止：1.5秒ガード
            setTimeout(() => {
                retryBtn.disabled = false;
                retryBtn.innerText = "再挑戦する";
            }, 1500);

            // 3回ごとに全画面広告
            if (playCount % 3 === 0) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), 
                  closeBtn = document.getElementById("close-ad-btn"), 
                  ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal;
            closeBtn.style.pointerEvents = "none";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) {
                    closeBtn.innerText = timerVal;
                } else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
